<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lupin Visual · Visual Identity System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800;900&family=Noto+Serif+TC:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,300..900;1,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ===== Reset & base ===== */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Noto Sans TC", "Plus Jakarta Sans", -apple-system, system-ui, sans-serif;
  font-feature-settings: "kern", "palt";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: var(--fg);
  background: var(--bg);
  transition: background-color .6s ease, color .6s ease;
}
img { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; }

/* ========== THEME TOKENS ========== */
/* Default = Soft Tech */
:root,
[data-theme="soft-tech"] {
  --bg: #F9F7F0;
  --bg-elev: #FFFFFF;
  --bg-inverse: #072A40;
  --fg: #072A40;
  --fg-muted: rgba(7, 42, 64, 0.62);
  --fg-faint: rgba(7, 42, 64, 0.35);
  --fg-on-inverse: #F9F7F0;
  --brand: #18B7BE;
  --brand-deep: #178CA4;
  --brand-soft: rgba(24, 183, 190, 0.10);
  --accent: #F43F5E;
  --hairline: rgba(7, 42, 64, 0.10);
  --hairline-strong: rgba(7, 42, 64, 0.22);
  --shadow-soft: 0 20px 40px -15px rgba(7, 42, 64, 0.10);
  --shadow-hover: 0 30px 60px -15px rgba(24, 183, 190, 0.25);
  --glow: 0 0 30px rgba(24, 183, 190, 0.28);
  --radius-s: 14px;
  --radius-m: 22px;
  --radius-l: 32px;
  --radius-xl: 44px;
  --radius-pill: 999px;
  --grain-opacity: 0.0;
  --display-font: "Plus Jakarta Sans", "Noto Sans TC", sans-serif;
  --heading-font: "Plus Jakarta Sans", "Noto Sans TC", sans-serif;
  --body-font: "Noto Sans TC", "Plus Jakarta Sans", sans-serif;
  --serif-font: "Fraunces", "Noto Serif TC", serif;
  --mono-font: "JetBrains Mono", ui-monospace, monospace;
}

/* Editorial Minimal */
[data-theme="editorial"] {
  --bg: #FAFAF8;
  --bg-elev: #FFFFFF;
  --bg-inverse: #0A0A0A;
  --fg: #0A0A0A;
  --fg-muted: rgba(10, 10, 10, 0.60);
  --fg-faint: rgba(10, 10, 10, 0.30);
  --fg-on-inverse: #FAFAF8;
  --brand: #127A7F;
  --brand-deep: #0E5B5F;
  --brand-soft: rgba(18, 122, 127, 0.08);
  --accent: #0A0A0A;
  --hairline: rgba(10, 10, 10, 0.14);
  --hairline-strong: rgba(10, 10, 10, 0.32);
  --shadow-soft: 0 1px 0 rgba(10, 10, 10, 0.05);
  --shadow-hover: 0 2px 0 rgba(10, 10, 10, 0.10);
  --glow: none;
  --radius-s: 2px;
  --radius-m: 3px;
  --radius-l: 4px;
  --radius-xl: 6px;
  --radius-pill: 4px;
  --grain-opacity: 0.0;
  --display-font: "Fraunces", "Noto Serif TC", serif;
  --heading-font: "Fraunces", "Noto Serif TC", serif;
  --body-font: "Noto Sans TC", "Plus Jakarta Sans", sans-serif;
  --serif-font: "Fraunces", "Noto Serif TC", serif;
  --mono-font: "JetBrains Mono", ui-monospace, monospace;
}

/* Warm Paper — Editorial colors + Soft Tech radius + warm copper accent */
[data-theme="warm-paper"] {
  --bg: #FAFAF8;
  --bg-elev: #FFFFFF;
  --bg-inverse: #0A0A0A;
  --fg: #0A0A0A;
  --fg-muted: rgba(10, 10, 10, 0.60);
  --fg-faint: rgba(10, 10, 10, 0.30);
  --fg-on-inverse: #FAFAF8;
  --brand: #127A7F;
  --brand-deep: #0E5B5F;
  --brand-soft: rgba(18, 122, 127, 0.10);
  --accent: #C07855;
  --hairline: rgba(10, 10, 10, 0.10);
  --hairline-strong: rgba(10, 10, 10, 0.22);
  --shadow-soft: 0 20px 40px -15px rgba(10, 10, 10, 0.08);
  --shadow-hover: 0 30px 60px -15px rgba(18, 122, 127, 0.22);
  --glow: 0 0 30px rgba(18, 122, 127, 0.20);
  --radius-s: 14px;
  --radius-m: 22px;
  --radius-l: 32px;
  --radius-xl: 44px;
  --radius-pill: 999px;
  --grain-opacity: 0.0;
  --display-font: "Plus Jakarta Sans", "Noto Sans TC", sans-serif;
  --heading-font: "Plus Jakarta Sans", "Noto Sans TC", sans-serif;
  --body-font: "Noto Sans TC", "Plus Jakarta Sans", sans-serif;
  --serif-font: "Fraunces", "Noto Serif TC", serif;
  --mono-font: "JetBrains Mono", ui-monospace, monospace;
}

/* Warm Craft */
[data-theme="warm-craft"] {
  --bg: #F3ECDD;
  --bg-elev: #FBF7EC;
  --bg-inverse: #2B1A12;
  --fg: #2B1A12;
  --fg-muted: rgba(43, 26, 18, 0.65);
  --fg-faint: rgba(43, 26, 18, 0.35);
  --fg-on-inverse: #F3ECDD;
  --brand: #C85A3E;
  --brand-deep: #9E3E27;
  --brand-soft: rgba(200, 90, 62, 0.12);
  --accent: #16807F;
  --hairline: rgba(43, 26, 18, 0.14);
  --hairline-strong: rgba(43, 26, 18, 0.30);
  --shadow-soft: 0 16px 32px -14px rgba(43, 26, 18, 0.18);
  --shadow-hover: 0 24px 48px -18px rgba(200, 90, 62, 0.35);
  --glow: 0 0 28px rgba(200, 90, 62, 0.28);
  --radius-s: 10px;
  --radius-m: 16px;
  --radius-l: 24px;
  --radius-xl: 36px;
  --radius-pill: 999px;
  --grain-opacity: 0.22;
  --display-font: "Fraunces", "Noto Serif TC", serif;
  --heading-font: "Noto Sans TC", "Plus Jakarta Sans", sans-serif;
  --body-font: "Noto Sans TC", "Plus Jakarta Sans", sans-serif;
  --serif-font: "Fraunces", "Noto Serif TC", serif;
  --mono-font: "JetBrains Mono", ui-monospace, monospace;
}

/* ========== PAGE LAYOUT ========== */
.page {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}
.page::before {
  /* subtle paper grain for warm-craft */
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.17 0 0 0 0 0.10 0 0 0 0 0.07 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  opacity: var(--grain-opacity);
  mix-blend-mode: multiply;
  z-index: 1;
}

.container {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 64px;
}
@media (max-width: 900px) { .container { padding: 0 24px; } }

section.sys {
  padding: 120px 0;
  position: relative;
  z-index: 2;
}
@media (max-width: 900px) { section.sys { padding: 72px 0; } }

/* Section header chrome */
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono-font);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: 20px;
}
.eyebrow .num {
  display: inline-grid;
  place-items: center;
  min-width: 28px;
  height: 28px;
  padding: 0 8px;
  border: 1px solid var(--hairline-strong);
  border-radius: var(--radius-pill);
  color: var(--fg);
}
[data-theme="editorial"] .eyebrow .num { border-radius: 2px; }

.section-title {
  font-family: var(--display-font);
  font-weight: 700;
  font-size: clamp(36px, 5.2vw, 64px);
  line-height: 1.08;
  letter-spacing: -0.02em;
  margin: 0 0 24px 0;
  text-wrap: balance;
}
.section-sub {
  font-family: var(--body-font);
  font-size: 18px;
  line-height: 1.7;
  color: var(--fg-muted);
  max-width: 62ch;
  margin: 0 0 56px 0;
}
[data-theme="editorial"] .section-title em,
[data-theme="warm-craft"] .section-title em {
  font-style: italic;
  font-weight: 400;
}

/* Divider between sections */
.rule {
  height: 1px;
  background: var(--hairline);
  width: 100%;
}

/* ==== Cards & tiles ==== */
.card {
  background: var(--bg-elev);
  border-radius: var(--radius-l);
  padding: 32px;
  box-shadow: var(--shadow-soft);
  position: relative;
}
[data-theme="editorial"] .card {
  border: 1px solid var(--hairline-strong);
  box-shadow: none;
}
.card-tight {
  padding: 20px;
  border-radius: var(--radius-m);
}

/* Logo tiles */
.logo-tile {
  display: grid;
  place-items: center;
  min-height: 220px;
  border-radius: var(--radius-l);
  background: var(--bg-elev);
  box-shadow: var(--shadow-soft);
  position: relative;
  overflow: hidden;
  transition: transform .3s ease, box-shadow .3s ease;
  padding: 36px;
}
[data-theme="editorial"] .logo-tile {
  border: 1px solid var(--hairline-strong);
  box-shadow: none;
  border-radius: 2px;
}
.logo-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.logo-tile .cap {
  position: absolute;
  left: 16px; bottom: 14px;
  font-family: var(--mono-font);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg-faint);
}
.logo-tile.dark { background: var(--bg-inverse); }
.logo-tile.dark .cap { color: rgba(255,255,255,0.5); }
.logo-tile.teal { background: var(--brand); }
.logo-tile.teal .cap { color: rgba(255,255,255,0.7); }
.logo-tile.accent { background: var(--accent); }
.logo-tile.accent .cap { color: rgba(255,255,255,0.8); }
.logo-tile.cream { background: var(--bg); }

/* Color swatches */
.swatch {
  border-radius: var(--radius-l);
  padding: 28px;
  min-height: 220px;
  color: var(--c-on);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  box-shadow: var(--shadow-soft);
  overflow: hidden;
}
[data-theme="editorial"] .swatch {
  border-radius: 2px;
  box-shadow: none;
  border: 1px solid var(--hairline-strong);
}
.swatch .name {
  font-family: var(--heading-font);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.01em;
}
.swatch .ratio {
  font-family: var(--mono-font);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  opacity: 0.7;
}
.swatch .meta {
  font-family: var(--mono-font);
  font-size: 12px;
  line-height: 1.5;
  opacity: 0.85;
}
.swatch .meta b { display:block; font-weight: 500; opacity: 0.55; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2px; }

/* Button examples */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--heading-font);
  font-weight: 600;
  font-size: 15px;
  padding: 14px 26px;
  border-radius: var(--radius-pill);
  border: 0;
  transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
  text-decoration: none;
}
.btn.filled {
  background: var(--bg-inverse);
  color: var(--fg-on-inverse);
  box-shadow: 0 12px 28px -12px rgba(7, 42, 64, 0.5);
}
.btn.filled:hover { background: var(--brand-deep); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.btn.primary { background: var(--brand); color: #fff; }
.btn.primary:hover { background: var(--brand-deep); transform: translateY(-2px); }
.btn.outline {
  background: transparent;
  border: 2px solid var(--hairline-strong);
  color: var(--fg);
}
.btn.outline:hover { border-color: var(--fg); }
.btn.tonal {
  background: var(--brand-soft);
  color: var(--fg);
}
[data-theme="editorial"] .btn { border-radius: 2px; }
[data-theme="editorial"] .btn.filled { box-shadow: none; }

/* Inputs */
.input {
  display: block;
  width: 100%;
  padding: 14px 22px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--hairline-strong);
  background: var(--bg-elev);
  color: var(--fg);
  font-family: var(--body-font);
  font-size: 15px;
  transition: box-shadow .25s ease, border-color .25s ease;
}
.input:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 4px var(--brand-soft);
}
[data-theme="editorial"] .input { border-radius: 2px; }

/* Tags */
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono-font);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  background: var(--brand-soft);
  color: var(--brand-deep);
}
[data-theme="editorial"] .tag { border-radius: 2px; }

/* Tweaks panel */
.tweaks {
  position: fixed;
  right: 20px; bottom: 20px;
  z-index: 100;
  background: var(--bg-elev);
  border-radius: var(--radius-l);
  padding: 20px;
  box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.2);
  border: 1px solid var(--hairline);
  min-width: 260px;
  backdrop-filter: blur(12px);
  font-family: var(--body-font);
}
[data-theme="editorial"] .tweaks { border-radius: 2px; }
.tweaks h5 {
  margin: 0 0 14px 0;
  font-family: var(--mono-font);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.tweaks .row { display: grid; gap: 8px; margin-bottom: 14px; }
.tweaks .row:last-child { margin-bottom: 0; }
.tweaks label {
  font-size: 11px;
  color: var(--fg-muted);
  font-family: var(--mono-font);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.tweaks .seg {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  padding: 4px;
  background: var(--brand-soft);
  border-radius: var(--radius-pill);
}
[data-theme="editorial"] .tweaks .seg { border-radius: 2px; }
.tweaks .seg button {
  border: 0;
  background: transparent;
  padding: 8px 10px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  color: var(--fg-muted);
  font-family: var(--heading-font);
  font-weight: 600;
  transition: all .2s ease;
}
[data-theme="editorial"] .tweaks .seg button { border-radius: 2px; }
.tweaks .seg button.active {
  background: var(--bg-elev);
  color: var(--fg);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

/* Nav */
.topnav {
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 14px 0;
  backdrop-filter: blur(16px) saturate(1.2);
  background: color-mix(in srgb, var(--bg) 80%, transparent);
  border-bottom: 1px solid var(--hairline);
}
.topnav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.topnav .brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--heading-font);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.02em;
}
.topnav .brand .mark {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  background: var(--fg);
  border-radius: var(--radius-pill);
}
.topnav .brand .mark img { width: 22px; height: 22px; }
.topnav nav {
  display: flex; gap: 4px;
  font-family: var(--mono-font);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.topnav nav a {
  color: var(--fg-muted);
  padding: 8px 12px;
  border-radius: var(--radius-pill);
  text-decoration: none;
  transition: all .2s ease;
}
[data-theme="editorial"] .topnav nav a { border-radius: 2px; }
.topnav nav a:hover { color: var(--fg); background: var(--brand-soft); }
.topnav .theme-badge {
  font-family: var(--mono-font);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--hairline-strong);
  border-radius: var(--radius-pill);
  color: var(--fg-muted);
}
[data-theme="editorial"] .topnav .theme-badge { border-radius: 2px; }
@media (max-width: 900px) {
  .topnav nav { display: none; }
}

/* Utility grid */
.grid { display: grid; gap: 24px; }
.g2 { grid-template-columns: repeat(2, 1fr); }
.g3 { grid-template-columns: repeat(3, 1fr); }
.g4 { grid-template-columns: repeat(4, 1fr); }
.g5 { grid-template-columns: repeat(5, 1fr); }
@media (max-width: 900px) {
  .g2, .g3, .g4, .g5 { grid-template-columns: 1fr; }
}

/* Utilities */
.mono { font-family: var(--mono-font); }
.serif { font-family: var(--serif-font); }
.center { text-align: center; }

/* footnote / kicker */
.kicker {
  font-family: var(--mono-font);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg-faint);
}

</style>
</head>
<body>
<div id="root"></div>
<script>
window.LUPIN_TWEAKS = {
  "theme": "soft-tech",
  "autoRotate": false
};
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// Theme definitions — used by app to show meta info for each theme and
// expose the theme switcher.

const THEMES = [
  {
    id: "soft-tech",
    name: "Soft Tech",
    zh: "柔性科技",
    description: "現有 Design System — Teal + Navy + Cream，超圓角、膠囊形、毛玻璃。專業且親切，最適合科技產品溝通。",
    palette: ["#F9F7F0", "#18B7BE", "#072A40", "#F43F5E"],
    keywords: ["Rounded", "Glassmorphism", "Calm", "Trustworthy"],
  },
  {
    id: "editorial",
    name: "Editorial Minimal",
    zh: "編輯極簡",
    description: "瑞士排版風格，襯線標題、鋒利直角、大量留白。把鹿頭當成一個鉛字印章。安靜、優雅、永恆。",
    palette: ["#FAFAF8", "#0A0A0A", "#127A7F", "#0A0A0A"],
    keywords: ["Serif", "Grid", "Quiet", "Timeless"],
  },
  {
    id: "warm-paper",
    name: "Warm Paper",
    zh: "溫白",
    description: "Editorial 的紙白 × 墨黑 × 靜青，加入暖銅色取代重複的 Ink accent，搭配 Soft Tech 的超圓角。清晰現代，帶一點溫度。",
    palette: ["#FAFAF8", "#0A0A0A", "#127A7F", "#C07855"],
    keywords: ["Paper", "Rounded", "Warm Accent", "Modern"],
  },
  {
    id: "warm-craft",
    name: "Warm Craft",
    zh: "溫暖工藝",
    description: "米色紙感底 × 赤陶色 × 工藝感邊緣。放大鹿頭手繪的溫度，像一間下午有陽光的工作室。",
    palette: ["#F3ECDD", "#C85A3E", "#2B1A12", "#16807F"],
    keywords: ["Crafted", "Warm", "Tactile", "Studio"],
  },
];

window.THEMES = THEMES;

</script>

<script type="text/babel">
// Lupin Visual SVG brand assets — all use currentColor so they inherit
// from whatever CSS 'color' they sit inside. Use <Symbol />, <SymbolOutline />,
// <Wordmark />, <LockupH />, <LockupStacked />.

function BrandMark({ size = 96, style, ...rest }) {
  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="679.52 576.14 132.52 132.52"
      width={size}
      height={size}
      role="img"
      aria-label="鹿苹視覺 Lupin Visual"
      style={{ display: "block", ...style }}

// Horizontal lockup: symbol + wordmark side by side
function LockupH({ width = 400, variant = "filled", style, ...rest }) {
  const SymbolComp = variant === "outline" ? BrandMarkOutline : BrandMark;
  const symSize = width * 0.28;
  return (
    <div style={{ display: "inline-flex", alignItems: "center", gap: width * 0.05, color: "currentColor", ...style }} {...rest}>
      <SymbolComp size={symSize} />
      <Wordmark width={width * 0.62} />
    </div>
  );
}

// Stacked lockup: symbol above wordmark
function LockupStacked({ width = 240, variant = "filled", style, ...rest }) {
  const SymbolComp = variant === "outline" ? BrandMarkOutline : BrandMark;
  const symSize = width * 0.55;
  return (
    <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", gap: width * 0.08, color: "currentColor", ...style }} {...rest}>
      <SymbolComp size={symSize} />
      <Wordmark width={width * 0.92} />
    </div>
  );
}

Object.assign(window, { BrandMark, BrandMarkOutline, Wordmark, LockupH, LockupStacked });

// Deer symbol SVG (simplified) — used when we want a pure-SVG glyph we can recolour.
// This is an abstract deer-with-antlers mark inspired by the Lupin logo,
// drawn in SVG so it can be tinted with currentColor.
function DeerSymbol({ size = 80, color = "currentColor", stroke = 0, bg = null }) {
  // A stylised deer face with antlers ( antlers = w-like curves, face = soft round shape with eye + mouth )
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      {bg && <circle cx="60" cy="60" r="58" fill={bg} />}
      <g fill={stroke > 0 ? "none" : color} stroke={stroke > 0 ? color : "none"} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">

        <path d="M30 42 C 26 30, 30 24, 36 26 C 41 28, 40 36, 43 40 C 46 44, 46 48, 42 50" />

        <path d="M40 52 C 38 72, 50 92, 60 92 C 70 92, 82 78, 82 60 C 82 54, 80 50, 74 48 L 46 48 C 42 48, 40 50, 40 52 Z" />
      </g>
      {/* Eye — always visible, punched out */}
      <circle cx="66" cy="64" r="2.2" fill={bg ? color : "var(--bg)"} />
    </svg>
  );
}

window.SectionHeader = SectionHeader;

function PatternTile({ name, caption, children }) {
  return (
    <div>
      <div style={{
        aspectRatio: "1",
        borderRadius: "var(--radius-l)",
        overflow: "hidden",
        background: "var(--brand)",
        position: "relative",

        {children}
        <span style={{
          position: "absolute", bottom: 14, left: 18,
          fontFamily: "var(--mono-font)", fontSize: 10,
          color: "rgba(255,255,255,0.7)",
          letterSpacing: "0.16em", textTransform: "uppercase",
        }}>{caption}</span>
      </div>
      <div style={{ marginTop: 12, fontFamily: "var(--heading-font)", fontWeight: 600, fontSize: 14 }}>{name}</div>
    </div>
  );
}

function AntlerPattern() {
  // Repeating rows of the antler glyph
  const rows = 4, cols = 4;
  const items = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      items.push(
        <img
          key={`${r}-${c}`}
          src="assets/symbol-black-fill.svg"
          alt=""
          style={{
            position: "absolute",
            width: "22%",
            top: `${(r * 100) / rows + 3}%`,
            left: `${(c * 100) / cols + ((r % 2) * 50) / cols}%`,
            opacity: 0.85,
            filter: "brightness(0) invert(1)",
            transform: `rotate(${((r + c) % 2) * 8 - 4}deg)`,
          }}
        />
      );
    }
  }
  return <div style={{ position: "absolute", inset: 0 }}>{items}</div>;
}

function DotTrail() {
  const dots = [];
  for (let i = 0; i < 60; i++) {
    dots.push(
      <div key={i} style={{
        position: "absolute",
        width: 10 + Math.random() * 14,
        height: 10 + Math.random() * 14,
        borderRadius: "50%",
        background: "var(--bg)",
        top: `${Math.random() * 100}%`,
        left: `${Math.random() * 100}%`,
        opacity: 0.2 + Math.random() * 0.6,
      }} />
    );
  }
  return <div style={{ position: "absolute", inset: 0 }}>{dots}</div>;
}

function CurvedRule() {
  return (
    <svg viewBox="0 0 200 200" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
      {[...Array(8)].map((_, i) => (
        <path
          key={i}
          d={`M 0 ${30 + i * 22} Q 50 ${10 + i * 22}, 100 ${30 + i * 22} T 200 ${30 + i * 22}`}
          fill="none"
          stroke="var(--bg)"
          strokeWidth="1.5"
          opacity={0.3 + (i % 3) * 0.2}
        />
      ))}
    </svg>
  );
}

function Bullet() {
  return (
    <svg width="72" height="72" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="6" fill="var(--brand)" />
      <circle cx="36" cy="36" r="18" fill="none" stroke="var(--brand)" strokeWidth="1.5" opacity="0.4"/>
      <circle cx="36" cy="36" r="30" fill="none" stroke="var(--brand)" strokeWidth="1" opacity="0.2"/>
    </svg>
  );
}

function Divider() {
  return (
    <svg width="120" height="40" viewBox="0 0 120 40">
      <circle cx="10" cy="20" r="3" fill="var(--brand)" />
      <path d="M 20 20 L 100 20" stroke="var(--brand)" strokeWidth="1.5"/>
      <circle cx="110" cy="20" r="3" fill="var(--brand)" />
    </svg>
  );
}

function QuoteMark() {
  return (
    <div style={{
      fontFamily: "var(--serif-font)",
      fontSize: 96,
      fontWeight: 700,
      color: "var(--brand)",
      lineHeight: 1,
      fontStyle: "italic",
    }}>“</div>
  );
}

function ArrowMark() {
  return (
    <svg width="80" height="40" viewBox="0 0 80 40">
      <path d="M 5 20 L 70 20" stroke="var(--fg)" strokeWidth="2" strokeLinecap="round"/>
      <path d="M 55 8 L 70 20 L 55 32" stroke="var(--fg)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    </svg>
  );
}

window.PatternSection = PatternSection;

</script>

<script type="text/babel">
// Root app — theme switcher + tweaks panel + section orchestration

const { useState: useStateRoot, useEffect: useEffectRoot } = React;

function App() {
  const defaults = (window.LUPIN_TWEAKS || {});
  const [theme, setTheme] = useStateRoot(defaults.theme || "soft-tech");
  const [editMode, setEditMode] = useStateRoot(false);

  // Apply theme to root
  useEffectRoot(() => {
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  // Restore from localStorage
  useEffectRoot(() => {
    const saved = localStorage.getItem("lupin:theme");
    if (saved && ["soft-tech", "editorial", "warm-paper", "warm-craft"].includes(saved)) {
      setTheme(saved);
    }
  }, []);

  useEffectRoot(() => {
    localStorage.setItem("lupin:theme", theme);
  }, [theme]);

  // Edit mode listener for tweaks toggle
  useEffectRoot(() => {
    function onMsg(e) {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setEditMode(true);
      if (e.data.type === "__deactivate_edit_mode") setEditMode(false);
    }
    window.addEventListener("message", onMsg);
    // announce availability after listener is registered
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  function updateTheme(next) {
    setTheme(next);
    window.parent.postMessage({
      type: "__edit_mode_set_keys",
      edits: { theme: next },
    }, "*");
  }

  const themeMeta = THEMES.find(t => t.id === theme);

  return (
    <div className="page" data-screen-label="Lupin Visual Identity System">
      <TopNav theme={theme} themeMeta={themeMeta} onChangeTheme={updateTheme} />
      <CoverSection theme={theme} themeMeta={themeMeta} />
      <ThemePicker theme={theme} onChangeTheme={updateTheme} />
      <LogoSection theme={theme} />
      <ColorSection theme={theme} />
      <TypeSection theme={theme} />
      <PatternSection theme={theme} />
      <ComponentsSection theme={theme} />
      <SocialSection theme={theme} />
      <DeckSection theme={theme} />
      <Footer theme={theme} />
      {editMode && <TweaksPanel theme={theme} onChangeTheme={updateTheme} />}
    </div>
  );
}

function TopNav({ theme, themeMeta, onChangeTheme }) {
  return (
    <header className="topnav">
      <div className="container topnav-inner">
        <a href="#top" className="brand" style={{ textDecoration: "none", color: "inherit" }}>
          <span className="mark" style={{ background: "var(--brand)" }}>
            <img src="assets/symbol-black-fill.svg" alt="" style={{ filter: "brightness(0) invert(1)" }}/>
          </span>
          <span>Lupin Visual · <span style={{ color: "var(--fg-muted)", fontWeight: 500 }}>VI System</span></span>
        </a>
        <nav>
          <a href="#logo">01 Logo</a>
          <a href="#color">02 Color</a>
          <a href="#type">03 Type</a>
          <a href="#pattern">04 Pattern</a>
          <a href="#components">05 UI</a>
          <a href="#social">06 Social</a>
          <a href="#deck">07 Deck</a>
        </nav>
        <span className="theme-badge">{themeMeta.name}</span>
      </div>
    </header>
  );
}

function ThemePicker({ theme, onChangeTheme }) {
  return (

              <div style={{ marginTop: 16, display: "flex", flexWrap: "wrap", gap: 6 }}>
                {t.keywords.map(k => (
                  <span key={k} style={{

                    background: "rgba(0,0,0,0.05)", color: "var(--fg-muted)",
                  }}>{k}</span>
                ))}
              </div>
            </button>
          ))}
        </div>
      </div>
    </section>
  );
}
